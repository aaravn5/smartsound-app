        - heading "Established techniques, applied as a calm feedback loop" [level=2] [ref=f4e47]
        - paragraph [ref=f4e48]: "SmartSound stands on two well-studied ideas: remote photoplethysmography (reading pulse from a camera) and amplitude-modulation entrainment (a soundscape whose amplitude is gently modulated). It pairs them into a real-time loop that nudges you toward a chosen state. It is a wellness tool, not a medical device — it doesn’t diagnose or treat anything, and the heart-rate read is an estimate."
