<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="description"
      content="SmartSound reads your pulse from your camera and reshapes a generative soundscape in real time to steer you into focus, calm, or sleep."
    />
    <title>SmartSound — calm, tuned to your body</title>
    <script>
      // Pressed at Night — ONE dark world. Dark is the only presented theme;
      // any stored "light" preference is ignored (lib/theme.ts stays dormant).
      (function () {
        document.documentElement.setAttribute('data-theme', 'dark')
        document.documentElement.style.colorScheme = 'dark'
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
