<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="description"
      content="SmartSound reads your pulse from your camera and reshapes a generative soundscape in real time to steer you into focus, calm, or sleep."
    />
    <title>SmartSound — calm, tuned to your body</title>
    <script>
      // Desktop.fm — light is native, Carbon Dark is the alternate. Apply the
      // stored choice before first paint (default light) so there is no flash.
      (function () {
        try {
          var v = window.localStorage.getItem('ss_theme')
          var t = v === 'light' || v === 'dark' ? v : 'light'
          document.documentElement.setAttribute('data-theme', t)
          document.documentElement.style.colorScheme = t
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light')
          document.documentElement.style.colorScheme = 'light'
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
